<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#232340"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="200" x2="512" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f0f5"/>
      <stop offset="40%" stop-color="#48cae4"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="100" y1="0" x2="412" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00b4d8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#00b4d8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg-grad)"/>
  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="94" fill="none" stroke="#3a3a5c" stroke-width="2" stroke-opacity="0.4"/>
  <!-- MOCO text -->
  <text x="256" y="290" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="180" letter-spacing="-4" fill="url(#text-grad)">MOCO</text>
  <!-- Accent line beneath -->
  <line x1="120" y1="330" x2="392" y2="330" stroke="url(#accent-line)" stroke-width="3" stroke-linecap="round"/>
  <!-- Subtle dots representing the four pillars -->
  <circle cx="192" cy="370" r="5" fill="#00b4d8" opacity="0.6"/>
  <circle cx="232" cy="370" r="5" fill="#00b4d8" opacity="0.7"/>
  <circle cx="272" cy="370" r="5" fill="#00b4d8" opacity="0.8"/>
  <circle cx="312" cy="370" r="5" fill="#00b4d8" opacity="0.9"/>
</svg>
